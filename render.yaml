services:
  # Node.js Next.js app
  - type: web
    name: realestate-ai
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # Supabase
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # OpenAI
      - key: OPENAI_API_KEY
        sync: false
      # WhatsApp
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_TEMPLATE_NAME
        value: realestate_outreach
      # Agent config
      - key: LISTING_AGENT_NAME
        value: Nadine Khalil
      - key: LISTING_AGENT_BROKERAGE
        value: KW Commercial
      # Cron auth
      - key: CRON_SECRET
        sync: false
      # Email
      - key: RESEND_API_KEY
        sync: false
      # Twilio SMS
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      # Stripe
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_STARTER_PRICE_ID
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PRO_PRICE_ID
        sync: false
      - key: NEXT_PUBLIC_STRIPE_AGENCY_PRICE_ID
        sync: false

  # Python webhook service
  - type: web
    name: realestate-ai-webhook
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn tools.webhook_app:app --bind 0.0.0.0:$PORT
    envVars:
      # Supabase
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # WhatsApp
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      # OpenAI
      - key: OPENAI_API_KEY
        sync: false
      # Email
      - key: RESEND_API_KEY
        sync: false
      # Twilio SMS
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      # Agent config
      - key: AGENT_NAME
        value: Nadine Khalil
      - key: AGENT_BROKERAGE
        value: KW Commercial

  # Cron Jobs
  - type: cron
    name: send-followups
    runtime: node
    plan: free
    schedule: "*/5 * * * *"
    buildCommand: echo "skip"
    startCommand: curl -s -H "Authorization:Bearer $CRON_SECRET" https://realestate-ai-sxtp.onrender.com/api/cron/send-followups
    envVars:
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: check-alerts
    runtime: node
    plan: free
    schedule: "*/30 * * * *"
    buildCommand: echo "skip"
    startCommand: curl -s -H "Authorization:Bearer $CRON_SECRET" https://realestate-ai-sxtp.onrender.com/api/cron/check-alerts
    envVars:
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: daily-ops
    runtime: node
    plan: free
    schedule: "0 5 * * *"
    buildCommand: echo "skip"
    startCommand: curl -s -H "Authorization:Bearer $CRON_SECRET" https://realestate-ai-sxtp.onrender.com/api/cron/daily-ops
    envVars:
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: refresh-lead-scores
    runtime: node
    plan: free
    schedule: "0 7 * * *"
    buildCommand: echo "skip"
    startCommand: curl -s -H "Authorization:Bearer $CRON_SECRET" https://realestate-ai-sxtp.onrender.com/api/cron/refresh-lead-scores
    envVars:
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: delivery-monitor
    runtime: node
    plan: free
    schedule: "*/30 * * * *"
    buildCommand: echo "skip"
    startCommand: curl -s -H "Authorization:Bearer $CRON_SECRET" https://realestate-ai-sxtp.onrender.com/api/cron/delivery-monitor
    envVars:
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: weekly-ai-audit
    runtime: node
    plan: free
    schedule: "0 6 * * 0"
    buildCommand: echo "skip"
    startCommand: curl -s -H "Authorization:Bearer $CRON_SECRET" https://realestate-ai-sxtp.onrender.com/api/cron/weekly-ai-audit
    envVars:
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: stale-lead-detection
    runtime: node
    plan: free
    schedule: "0 8 * * 1"
    buildCommand: echo "skip"
    startCommand: curl -s -H "Authorization:Bearer $CRON_SECRET" https://realestate-ai-sxtp.onrender.com/api/cron/stale-lead-detection
    envVars:
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: competitor-pricing
    runtime: node
    plan: free
    schedule: "0 6 1,15 * *"
    buildCommand: echo "skip"
    startCommand: curl -s -H "Authorization:Bearer $CRON_SECRET" https://realestate-ai-sxtp.onrender.com/api/cron/competitor-pricing
    envVars:
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: cost-report
    runtime: node
    plan: free
    schedule: "0 7 1 * *"
    buildCommand: echo "skip"
    startCommand: curl -s -H "Authorization:Bearer $CRON_SECRET" https://realestate-ai-sxtp.onrender.com/api/cron/cost-report
    envVars:
      - key: CRON_SECRET
        sync: false
